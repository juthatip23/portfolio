<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feam Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            color: #333;
            overflow-x: hidden;
            
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            background-attachment: fixed;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ฟองสบู่ */
        .bubbles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .bubble {
            position: absolute;
            bottom: -100px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: flyup 10s infinite ease-in;
        }
        @keyframes flyup {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 40px 20px;
            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(255, 154, 158, 0.2);
            border: 2px solid rgba(255,255,255,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 50px;
            color: #ff758c;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .wave {
            display: inline-block;
            animation: waving 2.5s infinite;
            transform-origin: 70% 70%;
        }
        @keyframes waving {
            0% { transform: rotate( 0.0deg) }
            10% { transform: rotate(14.0deg) }  
            20% { transform: rotate(-8.0deg) }
            30% { transform: rotate(14.0deg) }
            40% { transform: rotate(-4.0deg) }
            50% { transform: rotate(10.0deg) }
            60% { transform: rotate( 0.0deg) }  
            100% { transform: rotate( 0.0deg) }
        }

        .work-wrapper {
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        .img-link {
            display: block;
            width: 100%;
            text-decoration: none;
            cursor: pointer;
            /* ป้องกันไม่ให้ลิงก์เด้งขัดกับรูประหว่าง Hover */
            border-radius: 16px;
        }

        /* --- ✨ ลูกเล่นใหม่: เด้งดึ๋งแบบ Pop-up ตอนโหลด ✨ --- */
        .work-img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: block;
            
            /* ตอนเริ่ม: ให้โปร่งใส เล็กกว่าปกติ (scale 0.85) และตกลงมานิดนึง */
            opacity: 0;
            transform: translateY(60px) scale(0.85); 
            
            /* จังหวะสปริง (Bouncy Transition) */
            transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* เมื่อเลื่อนจอมาเจอ (Loaded) */
        .work-img.loaded {
            opacity: 1;
            /* คืนร่างปกติ (scale 1) มันจะเด้งเกินนิดนึงแล้วกลับมาพอดีเป๊ะ */
            transform: translateY(0) scale(1);
        }

        /* เอฟเฟกต์เวลาเอาเมาส์ชี้ */
        .work-img:hover {
            transform: scale(1.03) translateY(-8px); /* ขยายขึ้นอีกนิดให้ชัดเจน */
            box-shadow: 0 15px 30px rgba(255, 154, 158, 0.4);
            z-index: 10;
        }
        .img-link:hover .work-img {
            transform: scale(1.03) translateY(-8px);
        }

        @media (max-width: 768px) {
            .container { margin: 15px; padding: 30px 15px; border-radius: 20px; }
            h1 { font-size: 1.8rem; margin-bottom: 30px; }
            .work-wrapper { gap: 25px; }
            /* ในมือถือปิด hover */
            .work-img:hover, .img-link:hover .work-img { 
                transform: translateY(0) scale(1); 
                box-shadow: 0 8px 20px rgba(0,0,0,0.08); 
            }
        }
    </style>
</head>
<body>

    <div class="bubbles" id="bubbles-container"></div>

    <div class="container">
        <h1>Feam's Portfolio <span class="wave">👋</span></h1>

        <div class="work-wrapper">
            <img src="1.jpg" alt="Work 1" class="work-img" onload="this.classList.add('loaded')">
            <img src="2.jpg" loading="lazy" decoding="async" alt="Work 2" class="work-img">
            <img src="3.jpg" loading="lazy" decoding="async" alt="Work 3" class="work-img">
            <img src="4.jpg" loading="lazy" decoding="async" alt="Work 4" class="work-img">

            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="5.jpg" loading="lazy" decoding="async" alt="Work 5" class="work-img">
            </a>

            <img src="6.jpg" loading="lazy" decoding="async" alt="Work 6" class="work-img">
            <img src="7.jpg" loading="lazy" decoding="async" alt="Work 7" class="work-img">

            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="8.jpg" loading="lazy" decoding="async" alt="Work 8" class="work-img">
            </a>
            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="9.jpg" loading="lazy" decoding="async" alt="Work 9" class="work-img">
            </a>
            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="10.jpg" loading="lazy" decoding="async" alt="Work 10" class="work-img">
            </a>
            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="11.jpg" loading="lazy" decoding="async" alt="Work 11" class="work-img">
            </a>
            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="12.jpg" loading="lazy" decoding="async" alt="Work 12" class="work-img">
            </a>

            <img src="13.jpg" loading="lazy" decoding="async" alt="Work 13" class="work-img">

            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="14.jpg" loading="lazy" decoding="async" alt="Work 14" class="work-img">
            </a>
            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="15.jpg" loading="lazy" decoding="async" alt="Work 15" class="work-img">
            </a>
            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="16.jpg" loading="lazy" decoding="async" alt="Work 16" class="work-img">
            </a>
            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="17.jpg" loading="lazy" decoding="async" alt="Work 17" class="work-img">
            </a>
            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="18.jpg" loading="lazy" decoding="async" alt="Work 18" class="work-img">
            </a>
            <a href="ใส่ลิงก์ที่นี่" target="_blank" class="img-link">
                <img src="19.jpg" loading="lazy" decoding="async" alt="Work 19" class="work-img">
            </a>

            <img src="20.jpg" loading="lazy" decoding="async" alt="Work 20" class="work-img">
        </div>
        
        <p style="text-align: center; color: #ff758c; margin-top: 80px; padding-bottom: 20px; font-weight: 500;">
            ✨ Thanks for visiting ✨
        </p>
    </div>

    <script>
        function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for (let i = 0; i < 15; i++) {
                let bubble = document.createElement('div');
                bubble.classList.add('bubble');
                let size = Math.random() * 40 + 10;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDuration = Math.random() * 5 + 8 + 's';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(bubble);
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            createBubbles(); 
            const lazyImages = document.querySelectorAll('img[loading="lazy"]');
            
            if ('IntersectionObserver' in window) {
                // ปรับให้เห็นรูปเยอะขึ้นนิดนึงค่อยเด้ง จะได้เห็นจังหวะ Pop-up ชัดๆ
                const imageObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            const showImage = () => img.classList.add('loaded');
                            if (img.complete) showImage();
                            else img.onload = showImage;
                            observer.unobserve(img);
                        }
                    });
                }, { 
                    rootMargin: "0px",
                    threshold: 0.15  /* ต้องเห็นรูป 15% ก่อนถึงจะเด้ง */
                });

                lazyImages.forEach(img => imageObserver.observe(img));
            } else {
                lazyImages.forEach(img => img.classList.add('loaded'));
            }
        });
    </script>

</body>
</html>
