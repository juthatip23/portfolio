<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feam Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            color: #333;
            
            /* พื้นหลัง Aurora เคลื่อนไหว */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            background-attachment: fixed; /* ล็อกพื้นหลังไม่ให้เลื่อนตามตอนสกรอล */
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px; /* ขนาดกว้างสุดสำหรับจอคอม/ไอแพด */
            margin: 0 auto;
            padding: 40px 20px;
            
            /* เอฟเฟกต์กล่องกระจกโปร่งแสง */
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); /* สำหรับ Safari */
            
            min-height: 100vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 50px;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 2.2rem;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
        }

        /* --- ตั้งค่าภาพผลงาน --- */
        .work-wrapper {
            display: flex;
            flex-direction: column;
            gap: 30px; /* ระยะห่างระหว่างภาพ */
            align-items: center;
        }

        .work-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.12); /* เงารูป */
            background-color: rgba(0,0,0,0.05); /* สีพื้นหลังตอนรอโหลด */
            
            /* เอฟเฟกต์ตอนโหลดภาพ */
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        /* คลาสที่เพิ่มเมื่อภาพโหลดเสร็จและเลื่อนมาถึง */
        .work-img.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- ปรับแต่งสำหรับมือถือ --- */
        @media (max-width: 768px) {
            .container { padding: 20px 10px; }
            h1 { font-size: 1.8rem; margin-bottom: 30px; }
            .work-wrapper { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Feam's Portfolio</h1>

        <div class="work-wrapper">
            <img src="1.jpg" alt="Work 1" class="work-img" onload="this.classList.add('loaded')">
            
            <img src="2.jpg" loading="lazy" decoding="async" alt="Work 2" class="work-img">
            <img src="3.jpg" loading="lazy" decoding="async" alt="Work 3" class="work-img">
            <img src="4.jpg" loading="lazy" decoding="async" alt="Work 4" class="work-img">
            <img src="5.jpg" loading="lazy" decoding="async" alt="Work 5" class="work-img">
            <img src="6.jpg" loading="lazy" decoding="async" alt="Work 6" class="work-img">
            <img src="7.jpg" loading="lazy" decoding="async" alt="Work 7" class="work-img">
            <img src="8.jpg" loading="lazy" decoding="async" alt="Work 8" class="work-img">
            <img src="9.jpg" loading="lazy" decoding="async" alt="Work 9" class="work-img">
            <img src="10.jpg" loading="lazy" decoding="async" alt="Work 10" class="work-img">
            <img src="11.jpg" loading="lazy" decoding="async" alt="Work 11" class="work-img">
            <img src="12.jpg" loading="lazy" decoding="async" alt="Work 12" class="work-img">
            <img src="13.jpg" loading="lazy" decoding="async" alt="Work 13" class="work-img">
            <img src="14.jpg" loading="lazy" decoding="async" alt="Work 14" class="work-img">
            <img src="15.jpg" loading="lazy" decoding="async" alt="Work 15" class="work-img">
            <img src="16.jpg" loading="lazy" decoding="async" alt="Work 16" class="work-img">
            <img src="17.jpg" loading="lazy" decoding="async" alt="Work 17" class="work-img">
            <img src="18.jpg" loading="lazy" decoding="async" alt="Work 18" class="work-img">
            <img src="19.jpg" loading="lazy" decoding="async" alt="Work 19" class="work-img">
            <img src="20.jpg" loading="lazy" decoding="async" alt="Work 20" class="work-img">
        </div>
        
        <p style="text-align: center; color: #666; margin-top: 80px; padding-bottom: 20px; font-weight: 500;">
            © 2026 Feam Portfolio
        </p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const lazyImages = document.querySelectorAll('img[loading="lazy"]');
            
            if ('IntersectionObserver' in window) {
                const imageObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            
                            const showImage = () => img.classList.add('loaded');
                            
                            if (img.complete) {
                                showImage();
                            } else {
                                img.onload = showImage;
                            }
                            
                            observer.unobserve(img); // เลิกติดตามเมื่อภาพโหลดและแสดงผลแล้ว
                        }
                    });
                }, { 
                    rootMargin: "0px 0px 50px 0px", // โหลดภาพล่วงหน้าก่อนเลื่อนไปถึง 50px
                    threshold: 0.1 
                });

                lazyImages.forEach(img => imageObserver.observe(img));
            } else {
                // กรณี Browser เก่ามากๆ
                lazyImages.forEach(img => img.classList.add('loaded'));
            }
        });
    </script>

</body>
</html>
